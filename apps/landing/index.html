    <!-- JSON-LD: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {"@type":"Question","name":"¿Qué hace NoeticAI exactamente?","acceptedAnswer":{"@type":"Answer","text":"NoeticAI lee las notas que mantienes en Notion, las compara con el programa de estudios y la bibliografía de un curso que estás tomando, y produce un mapa de cobertura: qué conceptos has cubierto, cuáles son parciales y cuáles faltan por completo."}},
        {"@type":"Question","name":"¿Mis datos son privados?","acceptedAnswer":{"@type":"Answer","text":"Tus notas se leen mediante una integración de Notion con permisos limitados. Nunca entrenamos modelos con tus datos, nunca los vendemos y puedes revocar el acceso en cualquier momento. Las auditorías se almacenan cifradas en reposo."}},
        {"@type":"Question","name":"¿Qué herramientas de notas son compatibles?","acceptedAnswer":{"@type":"Answer","text":"Notion es compatible hoy. Obsidian, Apple Notes y directorios de markdown plano están en beta privada."}},
        {"@type":"Question","name":"¿Es solo una app de tarjetas de memoria?","acceptedAnswer":{"@type":"Answer","text":"No. NoeticAI no genera tarjetas de memoria ni te pone a prueba. Audita la integridad estructural de tus notas frente al corpus real de una disciplina. La salida es un mapa, no un ejercicio."}},
        {"@type":"Question","name":"¿Puedo usarlo sin un programa de estudios?","acceptedAnswer":{"@type":"Answer","text":"Sí. Puedes proporcionar una lista de lecturas, un esquema de tesis o una pregunta de investigación, y NoeticAI inferirá el conjunto de conceptos y auditará tus notas frente a eso."}},
        {"@type":"Question","name":"¿Qué disciplinas admite?","acceptedAnswer":{"@type":"Answer","text":"NoeticAI funciona para cualquier disciplina con uso intensivo de texto: filosofía, historia, literatura, derecho, teología, sociología, informática teórica. Es menos útil para ciencias de laboratorio y matemáticas puras."}}
      ]
    }
