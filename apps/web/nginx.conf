server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # static assets — hashed filenames, immutable
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}