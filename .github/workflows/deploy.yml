name: deploy

on:
  push:
    branches: [prod]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # push to GHCR
  id-token: write   # mint OIDC token for AWS

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never cancel a deploy mid-flight

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/tomas-izuel/noeticai-server:latest
            ghcr.io/tomas-izuel/noeticai-server:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/tomas-izuel/noeticai-web:latest
            ghcr.io/tomas-izuel/noeticai-web:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::445363793757:role/noeticai-github-deploy
          aws-region: us-east-1

      - name: Deploy via SSM
        run: |
          set -euo pipefail
          INSTANCE_ID=i-027491d6c98df7dfc
          SHORT_SHA="${{ steps.sha.outputs.short }}"
          # Multi-line shell payload, base64-encoded so we don't fight JSON escaping
          PAYLOAD=$(cat <<'BASH' | base64 -w0
          set -euo pipefail
          runuser -u ec2-user -- bash -lc '
            cd /home/ec2-user/noeticai
            docker compose -f docker-compose.prod.yml pull server web
            docker compose -f docker-compose.prod.yml up -d --force-recreate --no-deps server web
            docker compose -f docker-compose.prod.yml ps
          '
          BASH
          )
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters "commands=[\"echo $PAYLOAD | base64 -d | bash\"]" \
            --comment "deploy sha-$SHORT_SHA from gh-actions" \
            --query 'Command.CommandId' --output text)
          echo "CMD_ID=$CMD_ID"
          # Poll up to ~3 min
          for i in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo Pending)
            case "$STATUS" in
              Success) echo "deploy ok"; break;;
              Cancelled|TimedOut|Failed) echo "deploy failed: $STATUS";
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                  --query '{out:StandardOutputContent,err:StandardErrorContent}' --output json;
                exit 1;;
              *) sleep 5;;
            esac
          done
          if [ "$STATUS" != "Success" ]; then echo "timeout"; exit 1; fi
          # Dump the final stdout for the log
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text

      - name: Health check
        run: |
          set -euo pipefail
          for i in $(seq 1 18); do
            CODE=$(curl -sS -o /dev/null -w '%{http_code}' https://app.noeticai.me/api/auth/get-session || echo 000)
            if [ "$CODE" = "200" ]; then echo "health ok"; exit 0; fi
            echo "attempt $i: got $CODE, retrying in 5s"
            sleep 5
          done
          echo "health check failed"
          exit 1
